<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--po-app-bg); font-family: var(--po-font); }
  .card { padding: 20px 24px; background: #0F172A; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { width: 110px; border-radius: 10px; overflow: hidden; background: #1E293B; border: 1px solid #334155; }
  .swatch .tile { height: 44px; }
  .swatch .meta { padding: 6px 8px 8px; font-size: 10px; color: #94A3B8; line-height: 1.3; }
  .swatch .name { font-weight: 600; color: #F9FAFB; font-size: 11px; }
  .swatch .hex { font-family: var(--po-font-mono); font-size: 10px; color: #64748B; margin-top: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="tile" style="background:#0F172A"></div><div class="meta"><div class="name">Page</div><div class="hex">#0F172A</div></div></div>
    <div class="swatch"><div class="tile" style="background:#111827"></div><div class="meta"><div class="name">Chrome</div><div class="hex">#111827</div></div></div>
    <div class="swatch"><div class="tile" style="background:#1E293B"></div><div class="meta"><div class="name">Card</div><div class="hex">#1E293B</div></div></div>
    <div class="swatch"><div class="tile" style="background:#334155"></div><div class="meta"><div class="name">Border</div><div class="hex">#334155</div></div></div>
    <div class="swatch"><div class="tile" style="background:#94A3B8"></div><div class="meta"><div class="name">Muted</div><div class="hex">#94A3B8</div></div></div>
    <div class="swatch"><div class="tile" style="background:#F9FAFB"></div><div class="meta"><div class="name" style="color:#F9FAFB">Text</div><div class="hex">#F9FAFB</div></div></div>
  </div>
</div>
</body>
</html>
