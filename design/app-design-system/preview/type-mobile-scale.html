<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--po-app-bg); font-family: var(--po-font); }
  .card { padding: 24px 28px; display: flex; flex-direction: column; gap: 10px; }
  .spec { font-size: 10px; color: var(--po-placeholder); font-family: var(--po-font-mono); }
</style>
</head>
<body>
<div class="card">
  <div style="font: var(--po-m-h1); color: var(--po-text-heading); letter-spacing: -0.4px;">Your pool looks great <span class="spec">&nbsp;H1 · 24/700</span></div>
  <div style="font: var(--po-m-h2); color: var(--po-text-heading); letter-spacing: -0.3px;">Today's run sheet <span class="spec">&nbsp;H2 · 20/600</span></div>
  <div style="font: var(--po-m-h3); color: var(--po-text-body);">Pool specs <span class="spec">&nbsp;H3 · 16/600</span></div>
  <div style="font: var(--po-m-body); color: var(--po-text-body);">All readings in range. No action needed from you. <span class="spec">&nbsp;Body · 14/400</span></div>
  <div style="font: var(--po-m-small); color: var(--po-text-secondary);">9:42am · James T. <span class="spec">&nbsp;Small · 12/400</span></div>
  <div style="font: var(--po-m-label); color: var(--po-placeholder); text-transform: uppercase; letter-spacing: 0.5px;">NEXT UP <span class="spec" style="text-transform:none;">&nbsp;Label · 11/500 upper</span></div>
</div>
</body>
</html>
