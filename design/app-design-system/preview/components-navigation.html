<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--po-app-bg); font-family: var(--po-font); }
  .card { padding: 22px 24px; }
  .tabbar { background:#fff; border:1px solid var(--po-border-soft); border-radius: 14px; display:flex; overflow:hidden; }
  .tab { flex:1; padding:11px 6px; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; color:#9CA3AF; position:relative; border-bottom:2px solid transparent; }
  .tab.active { color:#111827; border-bottom-color:#111827; font-weight:600; }
  .tab .dot { position:absolute; top:6px; right:24%; width:6px; height:6px; border-radius:50%; background:#22C55E; }
  .bottom-nav { margin-top: 14px; background:#fff; border:1px solid var(--po-border-soft); border-radius:14px; padding:8px 14px; display:flex; justify-content:space-between; align-items:center; }
  .ni { width:44px; height:32px; border-radius:20px; display:flex; align-items:center; justify-content:center; }
  .ni.active { background:#111827; color:#fff; }
  .ni svg { width:18px; height:18px; }
  .spec { font-size:10px; color: var(--po-placeholder); font-family: var(--po-font-mono); margin-top: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="tabbar">
    <div class="tab active">Readings<span class="dot"></span></div>
    <div class="tab">Treatment</div>
    <div class="tab">Photos</div>
    <div class="tab">Notes</div>
    <div class="tab">Complete</div>
  </div>
  <div class="bottom-nav">
    <div class="ni active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1V9.5Z"/></svg></div>
    <div class="ni" style="color:#9CA3AF"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M16 3v4M8 3v4M4 11h16"/></svg></div>
    <div class="ni" style="color:#9CA3AF"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 7h16M4 12h16M4 17h10"/></svg></div>
    <div class="ni" style="color:#9CA3AF"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M18 14a6 6 0 1 0-12 0v1l-2 3h16l-2-3v-1ZM10 21a2 2 0 0 0 4 0"/></svg></div>
    <div class="ni" style="color:#9CA3AF"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></div>
  </div>
  <div class="spec">Tab bar · active underline + dot completion · Bottom nav · dark pill active</div>
</div>
</body>
</html>
